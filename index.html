<!doctype html>
<html lang="es-CL">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#F5F7FE" />
    <!-- Aplica el tema antes de pintar para evitar parpadeo (FOUC). Claro por defecto. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('lifeos-theme') || 'light'
          var dark = t === 'dark' || (t === 'system' && matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.toggle('dark', dark)
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', dark ? '#0E1124' : '#F5F7FE')
        } catch (e) {}
      })()
    </script>
    <meta name="description" content="Tu sistema de vida: universidad, hábitos, finanzas y enfoque." />
    <title>LifeOS</title>

    <!-- PWA / iOS: que se vea y funcione como app nativa -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LifeOS" />
    <meta name="format-detection" content="telephone=no" />

    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/logo.svg" sizes="any" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <link rel="mask-icon" href="/logo.svg" color="#6366f1" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
